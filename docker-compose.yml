services:
  backend:
    build: ./backend
    environment:
      KOMPASS_TOKEN: ${KOMPASS_TOKEN}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/kompass.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - kompass_data:/data
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
      VITE_KOMPASS_TOKEN: ${KOMPASS_TOKEN}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  kompass_data:
